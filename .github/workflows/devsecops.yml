# DevSecOps — escaneo de secretos, dependencias, SAST y contenedores
name: DevSecOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Escaneo programado semanal (lunes 06:00 UTC)
    - cron: "0 6 * * 1"

concurrency:
  group: devsecops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  secret-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  npm-audit:
    name: npm audit (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Auditoría de dependencias
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Publicar resultado npm audit
        if: failure()
        run: echo "::warning::npm audit reportó vulnerabilidades high/critical. Revisa el log."

  pip-audit:
    name: pip-audit (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar API y pip-audit
        run: |
          pip install -e .
          pip install pip-audit

      - name: Auditoría de dependencias Python
        run: pip-audit
        continue-on-error: true

  bandit-sast:
    name: SAST Python (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Bandit
        run: pip install "bandit[toml]>=1.8.0"

      - name: SAST (fallar en severidad medium+)
        run: bandit -r app -ll -f txt

  trivy-fs:
    name: Trivy — filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Escaneo de vulnerabilidades (fs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          skip-dirs: apps/web/node_modules,apps/web/dist,.git
          exit-code: "0"

      - name: Subir SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  trivy-config:
    name: Trivy — Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Misconfiguraciones en Docker
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Subir SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  devsecops-summary:
    name: DevSecOps — resumen
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - npm-audit
      - pip-audit
      - bandit-sast
      - trivy-fs
      - trivy-config
    if: always()
    steps:
      - name: Evaluar resultados
        run: |
          echo "secret-scan: ${{ needs.secret-scan.result }}"
          echo "npm-audit: ${{ needs.npm-audit.result }}"
          echo "pip-audit: ${{ needs.pip-audit.result }}"
          echo "bandit-sast: ${{ needs.bandit-sast.result }}"
          echo "trivy-fs: ${{ needs.trivy-fs.result }}"
          echo "trivy-config: ${{ needs.trivy-config.result }}"

          if [ "${{ needs.secret-scan.result }}" != "success" ]; then
            echo "::error::Gitleaks detectó posibles secretos."
            exit 1
          fi
          if [ "${{ needs.bandit-sast.result }}" != "success" ]; then
            echo "::error::Bandit reportó hallazgos de severidad alta."
            exit 1
          fi
          echo "DevSecOps: gates críticos superados."
