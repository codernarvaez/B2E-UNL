# CI — calidad, pruebas y build (gate previo a merge)
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-quality:
    name: API — lint y tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check app

      - name: Ruff (formato)
        run: ruff format --check app

      - name: Pytest
        run: pytest -q

  web-quality:
    name: Web — typecheck y build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build
      PUBLIC_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Astro check
        run: npm run check

      - name: Build producción
        run: npm run build:ci

  ci-summary:
    name: CI — resumen
    runs-on: ubuntu-latest
    needs: [api-quality, web-quality]
    if: always()
    steps:
      - name: Verificar jobs
        run: |
          if [ "${{ needs.api-quality.result }}" != "success" ] || [ "${{ needs.web-quality.result }}" != "success" ]; then
            echo "::error::CI falló. Revisa los jobs api-quality y web-quality."
            exit 1
          fi
          echo "CI completado correctamente."
